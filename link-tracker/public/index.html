<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Link Tracker — Create</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <div class="top-panel">
      <h1>Link Tracker</h1>
      <div class="pill-row">
        <span class="status-pill">MONITOR MODE</span>
        <span class="status-pill alt">AIM LOCKED</span>
      </div>
    </div>
    <p>Create a tracking link and view existing links.</p>

    <div class="tracker-grid">
      <div class="tracker-form">
        <form id="createForm">
          <input id="target" placeholder="https://example.com" required />
          <button type="submit">Create</button>
        </form>

        <div id="created" class="hidden">
          <p>Created link: <a id="createdUrl" href="#" target="_blank"></a></p>
          <p>Admin view: <a id="adminUrl" href="#" target="_blank"></a></p>
        </div>
      </div>

      <div class="radar-panel">
        <div class="console radar-panel">
          <canvas id="radar"></canvas>

          <div class="widget globe-wrap">
            <svg viewBox="0 0 78 78">
              <circle cx="39" cy="39" r="34" fill="none" stroke="var(--phosphor)" stroke-width="1"/>
              <ellipse cx="39" cy="39" rx="34" ry="12" fill="none" stroke="var(--phosphor)" stroke-width="0.8"/>
              <ellipse cx="39" cy="39" rx="34" ry="22" fill="none" stroke="var(--phosphor)" stroke-width="0.8"/>
              <ellipse cx="39" cy="39" rx="12" ry="34" fill="none" stroke="var(--phosphor)" stroke-width="0.8"/>
              <ellipse cx="39" cy="39" rx="22" ry="34" fill="none" stroke="var(--phosphor)" stroke-width="0.8"/>
              <line x1="5" y1="39" x2="73" y2="39" stroke="var(--phosphor)" stroke-width="0.8"/>
              <line x1="39" y1="5" x2="39" y2="73" stroke="var(--phosphor)" stroke-width="0.8"/>
            </svg>
          </div>
          <div class="compass-label" style="top:6px; left:47px;">N</div>
          <div class="compass-label" style="top:80px; left:47px;">S</div>
          <div class="compass-label" style="top:47px; left:2px;">W</div>
          <div class="compass-label" style="top:47px; left:84px;">E</div>

          <div class="widget pixel-grid" id="pixelGrid"></div>

          <div class="widget frame-grid">
            <div></div><div></div><div></div><div></div><div></div>
            <div></div><div></div><div></div><div></div><div></div>
            <div></div><div></div><div></div><div></div><div></div>
            <div></div><div></div><div></div><div></div><div></div>
          </div>

          <div class="widget eq left" id="eqLeft"></div>
          <div class="widget eq right" id="eqRight"></div>

          <div class="widget spectrum" id="spectrum"></div>

          <div class="hud">
            <div class="corner top-right-text">
              RANGE 240nm<br>
              TRK: <span id="trackCount">0</span> <span class="blink">●</span>
            </div>
            <div class="corner bottom-right-text">
              BRG <span id="sweepBrg">000</span>°<br>
              <span id="clock">00:00:00</span>Z
            </div>
          </div>
        </div>
      </div>
    </div>

    <h2>Your Links</h2>
    <div style="margin-bottom:12px">
      <button id="deleteAllBtn" style="background:#ef4444;color:#fff;padding:8px 12px;border-radius:8px;border:none;cursor:pointer">Delete all history</button>
    </div>
    <div id="linksList">Loading…</div>
  </main>
  <script src="main.js"></script>
</body>
</html>
