<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Link Tracker — Admin</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
  <main class="container">
    <div class="top-panel">
      <h1>Admin — View Clicks</h1>
      <div class="pill-row">
        <span class="status-pill">SECURE CONSOLE</span>
        <span class="status-pill alt">DATA STREAM</span>
      </div>
    </div>

    <div class="tracker-grid">
        <div class="tracker-form">
         <form id="viewForm">
      <input id="viewId" placeholder="Enter link id (e.g. abc123)" style="width:40%" />
      <button type="submit">View</button>
    </form>
    </div>
    <div class="radar-panel">
      <div class="console radar-panel">
        <canvas id="radar"></canvas>

        <div class="widget globe-wrap">
          <svg viewBox="0 0 78 78">
            <circle cx="39" cy="39" r="34" fill="none" stroke="var(--phosphor)" stroke-width="1"/>
            <ellipse cx="39" cy="39" rx="34" ry="12" fill="none" stroke="var(--phosphor)" stroke-width="0.8"/>
            <ellipse cx="39" cy="39" rx="34" ry="22" fill="none" stroke="var(--phosphor)" stroke-width="0.8"/>
            <ellipse cx="39" cy="39" rx="12" ry="34" fill="none" stroke="var(--phosphor)" stroke-width="0.8"/>
            <ellipse cx="39" cy="39" rx="22" ry="34" fill="none" stroke="var(--phosphor)" stroke-width="0.8"/>
            <line x1="5" y1="39" x2="73" y2="39" stroke="var(--phosphor)" stroke-width="0.8"/>
            <line x1="39" y1="5" x2="39" y2="73" stroke="var(--phosphor)" stroke-width="0.8"/>
          </svg>
        </div>
        <div class="compass-label" style="top:6px; left:47px;">N</div>
        <div class="compass-label" style="top:80px; left:47px;">S</div>
        <div class="compass-label" style="top:47px; left:2px;">W</div>
        <div class="compass-label" style="top:47px; left:84px;">E</div>

        <div class="widget pixel-grid" id="pixelGrid"></div>

        <div class="widget frame-grid">
          <div></div><div></div><div></div><div></div><div></div>
          <div></div><div></div><div></div><div></div><div></div>
          <div></div><div></div><div></div><div></div><div></div>
          <div></div><div></div><div></div><div></div><div></div>
        </div>

        <div class="widget eq left" id="eqLeft"></div>
        <div class="widget eq right" id="eqRight"></div>

        <div class="widget spectrum" id="spectrum"></div>

        <div class="hud">
          <div class="corner top-right-text">
            RANGE 240nm<br>
            TRK: <span id="trackCount">0</span> <span class="blink">●</span>
          </div>
          <div class="corner bottom-right-text">
            BRG <span id="sweepBrg">000</span>°<br>
            <span id="clock">00:00:00</span>Z
          </div>
        </div>
      </div>
    </div>
   
    </div>

    <section id="result" class="hidden">
      <div class="admin-grid">
        <div class="card">
          <h2>Link details</h2>
          <p><strong>Target:</strong> <span id="linkTarget">-</span></p>
          <p><strong>Created:</strong> <span id="createdAt">-</span></p>
          <div class="button-row"><button id="deleteLinkBtn" class="danger-btn">Delete this link</button></div>
        </div>

        <div class="card">
          <h2>Latest client info</h2>
          <div id="deviceInfo" class="deviceInfo">No client details available.</div>
        </div>

        <div class="card map-card">
          <h2>Location map</h2>
          <div id="map" class="map"></div>
        </div>
      </div>

      <section class="card">
        <h3>Clicks</h3>
        <ul id="clicks" class="click-grid"></ul>
      </section>
    </section>
  </main>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="admin.js"></script>
</body>
</html>
